<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>藏題閣 題庫測驗｜生成式 AI 能力認證</title>
<style>
:root{--bg:#f7f7f4;--paper:#fff;--ink:#191919;--muted:#737373;--line:#e6e2da;--brand:#2563eb;--soft:#eff6ff;--good:#15803d;--goodBg:#f0fdf4;--bad:#b91c1c;--badBg:#fef2f2;--warn:#92400e;--warnBg:#fffbeb;--shadow:0 8px 24px rgba(0,0,0,.055);--radius:18px;--font-ui:"Inter","Noto Sans TC","Noto Sans CJK TC","PingFang TC","Microsoft JhengHei UI","Microsoft JhengHei","Segoe UI",Arial,sans-serif;--font-reading:"Noto Sans TC","Noto Sans CJK TC","PingFang TC","Microsoft JhengHei UI","Microsoft JhengHei","Segoe UI",Arial,sans-serif}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:var(--font-ui);font-weight:400;font-synthesis-weight:none;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--ink)}b,strong{font-weight:600}
.app{width:min(900px,calc(100% - 24px));margin:0 auto;padding:12px 0 94px}.topbar{position:sticky;top:0;z-index:10;margin:0 -12px 10px;padding:10px 12px;background:rgba(247,247,244,.93);backdrop-filter:blur(12px);border-bottom:1px solid rgba(230,226,218,.9)}
.header{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}h1{font-size:20px;letter-spacing:0;margin:0;font-weight:650}.version{font-size:12px;color:var(--muted);font-weight:500;margin-left:6px;white-space:nowrap}.meta{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6}.bankName{color:#1d4ed8;font-weight:600}
.topControls{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:10px}.controlCard{display:flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:6px;box-shadow:var(--shadow)}.controlCard.actionCard{justify-content:flex-end;margin-left:auto;flex-wrap:wrap}
button,input,select{font:inherit}button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:8px 11px;font-size:13px;font-weight:550;cursor:pointer}button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}button.blue{background:var(--brand);color:#fff;border-color:var(--brand)}button:active{transform:translateY(1px)}button:disabled{cursor:not-allowed;opacity:.55;transform:none}
.scoreline{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-top:9px}.progress{height:8px;border-radius:999px;background:#e9e7e2;overflow:hidden}.progress>i{display:block;height:100%;width:0;background:var(--brand);transition:.2s}.scoreSmall{font-size:13px;font-weight:600;white-space:nowrap}.masked{filter:blur(4px);opacity:.65;letter-spacing:0;user-select:none}
.tools{margin-top:10px;display:none;border:1px solid var(--line);background:#fff;border-radius:16px;padding:10px;box-shadow:var(--shadow)}.tools.open{display:block}.toolgrid{display:grid;grid-template-columns:1fr;gap:10px;align-items:start}.filterRow{display:grid;grid-template-columns:1fr 1fr;gap:8px}input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;color:var(--ink);outline:none;font-size:14px}input:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.quizBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}.feed{display:grid;gap:10px}
.status{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;text-align:center}.statusTitle{font-size:17px;font-weight:650;margin-bottom:6px}.statusText{font-size:14px;color:var(--muted);line-height:1.75;max-width:620px;margin:0 auto 12px}.statusActions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.qcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}.qhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}.tags{display:flex;gap:6px;flex-wrap:wrap;min-width:0}.tag{font-size:11px;font-weight:550;color:#525252;background:#f5f5f4;border:1px solid #ece7df;border-radius:999px;padding:4px 7px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tag.topic{background:var(--soft);color:#1d4ed8;border-color:#dbeafe}.num{font-size:12px;color:var(--muted);white-space:nowrap;padding-top:3px}.qtext{font-family:var(--font-reading);font-size:18px;line-height:1.66;font-weight:550;margin:8px 0 12px;letter-spacing:0}
.options{display:grid;gap:8px}.opt{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px 12px;text-align:left;font-size:15px;line-height:1.58;font-weight:400;color:var(--ink)}.opt b{display:inline-block;min-width:22px;color:var(--muted);font-weight:650}.opt:hover{border-color:#bfdbfe;background:#fbfdff}.opt.selected{border-color:#60a5fa;background:#eff6ff}.opt.correct{border-color:#86efac;background:var(--goodBg);color:#14532d}.opt.wrong{border-color:#fecaca;background:var(--badBg);color:#7f1d1d}
.answerTools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}.answerBtn{padding:7px 10px;font-size:12px;background:#fff}.hint{font-size:12px;color:var(--muted);line-height:1.65}.answerBox{display:none;margin-top:10px;padding:12px;border-radius:14px;border:1px dashed #bfdbfe;background:#fbfdff}.answerBox.show{display:block}.answerTitle{font-size:13px;font-weight:650;color:#1d4ed8;margin-bottom:6px}.answerText{font-family:var(--font-reading);font-size:15px;line-height:1.75;font-weight:400}.answerText p{margin:0 0 8px}.tip{margin-top:8px;padding:10px;border-radius:12px;background:var(--warnBg);border:1px solid #fde68a;color:var(--warn);font-size:14px;line-height:1.75}.empty{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:28px;text-align:center;color:var(--muted)}
.dock{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:30;width:max-content;max-width:calc(100% - 20px);display:grid;grid-template-columns:auto auto auto;gap:8px;align-items:center;background:rgba(25,25,25,.94);color:#fff;border-radius:18px;padding:10px 11px;box-shadow:0 18px 40px rgba(0,0,0,.25);backdrop-filter:blur(14px);transition:background .25s}.dock .label{font-size:12px;color:#d4d4d4;white-space:nowrap}.dock .value{font-size:22px;font-weight:800;line-height:1.1;white-space:nowrap;letter-spacing:0}.dock button{background:#fff;color:#111;border:0;white-space:nowrap}.note{font-size:12px;color:#d4d4d4}.dock .verdict{font-size:11px;font-weight:750;padding:3px 8px;border-radius:999px;margin-left:6px;display:inline-block;vertical-align:middle}.dock.pass{background:rgba(20,83,45,.96)}.dock.pass .value{color:#86efac}.dock.pass .label,.dock.pass .note{color:#bbf7d0}.dock.pass .verdict{background:#22c55e;color:#052e16}.dock.fail{background:rgba(127,29,29,.96)}.dock.fail .value{color:#fca5a5}.dock.fail .label,.dock.fail .note{color:#fecaca}.dock.fail .verdict{background:#ef4444;color:#450a0a}
@media (max-width:760px){.app{width:min(100% - 14px,900px);padding-top:6px}.topbar{margin:0 -7px 8px;padding:8px 7px}h1{font-size:17px}.topControls{gap:7px;align-items:stretch}.controlCard{padding:5px;border-radius:14px;gap:4px}.controlCard.actionCard{margin-left:0}.controlCard button{padding:7px 8px;font-size:12px}.filterRow{grid-template-columns:1fr}.qcard{padding:12px;border-radius:15px}.qtext{font-size:16px}.tag{max-width:170px}.dock{grid-template-columns:auto auto;bottom:8px;border-radius:16px}.dock .note{display:none}}
@media (min-width:980px){.feed{gap:12px}.qcard{padding:16px 18px}}@media print{.topbar,.dock,.answerTools{display:none}.app{width:100%;padding:0}.qcard{box-shadow:none;break-inside:avoid}.answerBox{display:block}}
.tabnav{display:flex;gap:6px;margin:6px 0 12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:5px;box-shadow:var(--shadow);overflow-x:auto}
.tabnav button{flex:1;min-width:max-content;border:0;background:transparent;color:var(--muted);border-radius:10px;padding:9px 12px;font-size:13.5px;font-weight:600;white-space:nowrap;cursor:pointer}
.tabnav button.active{background:var(--ink);color:#fff}
.tabPanel{display:none}.tabPanel.active{display:block}
.memCue{margin-top:10px;padding:11px 12px;border-radius:12px;background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;font-size:14px;line-height:1.75}
.memCue b{color:#9a3412}
.glossWrap{display:grid;gap:10px}
.glossSearchRow{position:sticky;top:64px;z-index:5;background:rgba(247,247,244,.95);backdrop-filter:blur(10px);padding:4px 0 8px;margin-bottom:0}
.glossSearchRow input{font-size:14px}
.glossSection{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.glossSection h2{font-size:15.5px;margin:0 0 10px;color:var(--ink);border-bottom:1px solid var(--line);padding-bottom:7px;font-weight:650;display:flex;align-items:center;justify-content:space-between}
.glossSection h2 .count{font-size:12px;color:var(--muted);font-weight:550}
.glossList{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
@media (max-width:760px){.glossList{grid-template-columns:1fr}}
.glossItem{padding:9px 0;border-bottom:1px dashed var(--line)}
.glossItem:last-child{border-bottom:0}
.glossTerm{font-size:14.5px;font-weight:650;color:#1d4ed8;margin-bottom:3px}
.glossTerm .zh{color:var(--muted);font-size:12.5px;font-weight:500;margin-left:6px}
.glossDesc{font-size:13.5px;line-height:1.68;color:var(--ink);font-family:var(--font-reading)}
.tipsList{display:grid;gap:10px}
.tipsIntro{background:var(--soft);border:1px solid #dbeafe;border-radius:var(--radius);padding:14px 16px;color:#1e3a8a;font-size:14px;line-height:1.7}
.tipCard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.tipCard h3{margin:0 0 8px;font-size:15.5px;font-weight:650;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tipBadge{font-size:11px;background:var(--soft);color:#1d4ed8;border:1px solid #dbeafe;border-radius:999px;padding:3px 8px;font-weight:600}
.tipBadge.warn{background:#fffbeb;color:#92400e;border-color:#fde68a}
.tipBadge.good{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
.tipCard .when{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.6}
.tipCard .how{font-size:14px;line-height:1.72;margin:0 0 8px;font-family:var(--font-reading)}
.tipCard .example{background:#fbfdff;border:1px solid #dbeafe;border-radius:12px;padding:9px 11px;font-size:13.5px;line-height:1.68;color:#1e3a8a;font-family:var(--font-reading)}
.tipCard .example b{color:#1d4ed8}
.tabBadge{display:inline-block;min-width:18px;height:18px;line-height:18px;padding:0 5px;font-size:11px;font-weight:700;background:#b91c1c;color:#fff;border-radius:999px;margin-left:5px;vertical-align:1px;text-align:center}
.tabBadge.zero{background:#a3a3a3}
.tabBtn.active .tabBadge{background:#fff;color:#b91c1c}
.tabBtn.active .tabBadge.zero{background:#d4d4d4;color:#525252}
.smartBtn{background:#f59e0b!important;color:#1f1300!important;border-color:#f59e0b!important;font-weight:650}
.smartBtn:hover{background:#fbbf24!important;border-color:#fbbf24!important}
.progressBoard{display:grid;gap:10px}
.statsCard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.statsCard h2{margin:0 0 10px;font-size:15.5px;font-weight:650;color:var(--ink);border-bottom:1px solid var(--line);padding-bottom:7px}
.statRow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media (max-width:560px){.statRow{grid-template-columns:repeat(3,1fr);gap:6px}}
.statBlock{background:#fafaf7;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.statBlock .lbl{font-size:11.5px;color:var(--muted);font-weight:550;margin-bottom:4px}
.statBlock .val{font-size:22px;font-weight:700;line-height:1.1;letter-spacing:-0.5px}
.statBlock .sub{font-size:11px;color:var(--muted);margin-top:2px}
.statBlock.good .val{color:#15803d}
.statBlock.warn .val{color:#b91c1c}
.topicBars{display:grid;gap:8px;margin-top:4px}
.topicBar{display:grid;grid-template-columns:100px 1fr auto;gap:8px;align-items:center;font-size:12.5px}
.topicBar .name{color:var(--ink);font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topicBar .bar{height:10px;background:#e9e7e2;border-radius:999px;overflow:hidden}
.topicBar .bar>i{display:block;height:100%;background:#22c55e;transition:width .25s}
.topicBar .bar>i.mid{background:#facc15}
.topicBar .bar>i.low{background:#ef4444}
.topicBar .pct{font-size:12px;color:var(--muted);min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
@media (max-width:560px){.topicBar{grid-template-columns:88px 1fr auto;gap:6px;font-size:12px}.topicBar .pct{min-width:54px}}
.weakHint{font-size:13px;color:#7c2d12;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:9px 11px;margin-top:8px;line-height:1.65}
.weakHint b{color:#9a3412}
.actionBar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.actionBar button{font-size:12.5px;padding:7px 11px}
.actionBar .ghost{background:#fff}
.actionBar .danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.actionBar .danger:hover{background:#fee2e2}
.wrongList{display:grid;gap:8px}
.wrongItem{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:11px 13px;display:grid;gap:6px;box-shadow:var(--shadow)}
.wrongItem .head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
.wrongItem .head .tag{font-size:11px;padding:3px 7px}
.wrongItem .head .wc{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:650}
.wrongItem .qtxt{font-size:14.5px;line-height:1.65;font-family:var(--font-reading);font-weight:550;color:var(--ink)}
.wrongItem .ans{font-size:13px;color:#166534;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:7px 9px;line-height:1.6}
.wrongItem .row{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.wrongItem .row button{font-size:12px;padding:6px 10px}
.masteredItem{opacity:.55}
.emptyWrong{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--radius);padding:18px;text-align:center;color:#166534;font-size:14px;line-height:1.7}
.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:rgba(25,25,25,.95);color:#fff;border-radius:12px;padding:9px 14px;font-size:13px;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
<section class="topbar">
  <div class="header">
    <div>
      <h1>藏題閣 題庫測驗 <span class="version">生成式 AI 能力認證</span></h1>
      <div class="meta"><span id="shownCount">0</span> 題｜已作答 <span id="answeredCount">0</span>｜答對 <span id="correctCount">0</span>｜內嵌題庫：<span class="bankName" id="bankName">藏題閣_題庫_合併版.md（438題）</span></div>
    </div>
  </div>
  <div class="topControls">
    <div class="controlCard actionCard">
      <button id="toggleTools" type="button">▲ 篩選</button>
      <button class="smartBtn" id="smartReview" type="button" hidden>複習 <span id="smartReviewCount">0</span> 題錯題</button>
      <button class="primary" id="startQuizTop" type="button">重抽</button>
    </div>
  </div>
  <div class="scoreline"><div class="progress"><i id="progressBar"></i></div><div class="scoreSmall"><span id="rateCount">0%</span></div></div>
  <div class="tools" id="toolsPanel">
    <div class="toolgrid">
      <div class="filterRow">
        <select id="groupFilter"><option value="">全部題號區間</option></select>
        <select id="topicFilter"><option value="">全部主題</option></select>
      </div>
    </div>
    <div class="quizBtns">
      <select id="quizSize" style="max-width:160px">
        <option value="80" selected>隨機 80 題</option>
        <option value="20">隨機 20 題</option>
        <option value="30">隨機 30 題</option>
        <option value="50">隨機 50 題</option>
        <option value="all">全部題目</option>
      </select>
      <button class="blue" id="startQuiz" type="button">開始 / 重抽模擬測驗</button>
      <button id="showAll" type="button">顯示全部</button>
      <button id="resetAnswers" type="button">清空作答</button>
    </div>
  </div>
</section>

<nav class="tabnav" role="tablist" aria-label="主功能切換">
  <button type="button" class="tabBtn active" data-tab="quiz">題庫測驗</button>
  <button type="button" class="tabBtn" data-tab="gloss">英文用詞</button>
  <button type="button" class="tabBtn" data-tab="tips">答題技巧</button>
  <button type="button" class="tabBtn" data-tab="progress">我的進度<span class="tabBadge zero" id="badgeProgress" hidden>0</span></button>
</nav>
<main>
  <div class="tabPanel active" id="tab-quiz"><div class="feed" id="questions"></div></div>
  <div class="tabPanel" id="tab-gloss"><div class="glossWrap" id="glossaryBox"></div></div>
  <div class="tabPanel" id="tab-tips"><div class="tipsList" id="tipsBox"></div></div>
  <div class="tabPanel" id="tab-progress"><div class="progressBoard" id="progressBox"></div></div>
</main>
<input type="file" id="importFile" accept="application/json,.json" hidden>
<div class="toast" id="toast"></div>

<section class="dock" aria-label="測驗分數">
  <div>
    <div class="label">目前分數</div>
    <div class="value masked" id="bottomScore">••••••</div>
  </div>
  <button id="toggleScore" type="button">顯示</button>
  <div class="note" id="dockNote">答完後再翻牌</div>
</section>

/* ========== localStorage 持久化層 ========== */
const STORAGE_KEY = 'aiq_v1';
function defaultStore(){
  return {
    version: 1,
    activeIds: [],
    answers: {},
    revealed: [],
    optionOrders: {},
    qStats: {},     // qid -> { wrongs, corrects, lastResult, streak, lastTs }
    mastered: [],
    lastUpdated: 0
  };
}
let store;
try {
  const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  store = raw && raw.version === 1 ? Object.assign(defaultStore(), raw) : defaultStore();
} catch(e){ store = defaultStore(); }
function saveStore(){
  store.lastUpdated = Date.now();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch(e){}
}

let activeIds = (store.activeIds||[]).slice();
let answers = Object.assign({}, store.answers||{});
let revealed = new Set(store.revealed||[]);
let optionOrders = Object.assign({}, store.optionOrders||{});
let scoreVisible = false;
const el = id => document.getElementById(id);

function persistSession(){
  store.activeIds = activeIds.slice();
  store.answers = Object.assign({}, answers);
  store.revealed = [...revealed];
  store.optionOrders = Object.assign({}, optionOrders);
  saveStore();
}

/* 紀錄一次作答：只在答案「變動」時更新統計，避免亂點刷數據 */
function recordAnswer(qid, picked){
  const q = DATA.find(x=>x.id===qid);
  if(!q) return;
  const prev = answers[qid];
  if(prev === picked) return; // 點同一格不重複計
  const correct = picked === q.correctIndex;
  const s = store.qStats[qid] = store.qStats[qid] || {wrongs:0, corrects:0, lastResult:null, streak:0, lastTs:0};
  if(correct){
    s.corrects++;
    s.streak = s.lastResult === 'right' ? s.streak + 1 : 1;
    s.lastResult = 'right';
    if(s.streak >= 3 && !store.mastered.includes(qid)) store.mastered.push(qid);
  } else {
    s.wrongs++;
    s.streak = 0;
    s.lastResult = 'wrong';
    const mi = store.mastered.indexOf(qid);
    if(mi >= 0) store.mastered.splice(mi, 1);
  }
  s.lastTs = Date.now();
  answers[qid] = picked;
}

function computeWrongIds(){
  const masteredSet = new Set(store.mastered);
  return Object.keys(store.qStats)
    .map(Number)
    .filter(id => store.qStats[id].wrongs >= 1 && !masteredSet.has(id))
    .sort((a,b) => (store.qStats[b].wrongs - store.qStats[a].wrongs) || (store.qStats[b].lastTs - store.qStats[a].lastTs));
}

function computeOverallStats(){
  let answered = 0, totalRight = 0, totalWrong = 0;
  for(const id in store.qStats){
    const s = store.qStats[id];
    if(s.corrects + s.wrongs > 0) answered++;
    totalRight += s.corrects;
    totalWrong += s.wrongs;
  }
  const totalAttempts = totalRight + totalWrong;
  const acc = totalAttempts ? Math.round(totalRight / totalAttempts * 100) : 0;
  return { answered, totalRight, totalWrong, acc, mastered: store.mastered.length };
}

function computeTopicStats(){
  const map = {}; // topic -> { right, wrong }
  for(const id in store.qStats){
    const q = DATA.find(x=>x.id===Number(id));
    if(!q) continue;
    const s = store.qStats[id];
    const m = map[q.topic] = map[q.topic] || { right:0, wrong:0 };
    m.right += s.corrects;
    m.wrong += s.wrongs;
  }
  return Object.entries(map)
    .map(([topic, v]) => ({ topic, right: v.right, wrong: v.wrong, total: v.right + v.wrong, acc: v.right+v.wrong ? Math.round(v.right/(v.right+v.wrong)*100) : 0 }))
    .filter(x => x.total > 0)
    .sort((a,b) => a.acc - b.acc);
}

function updateBadges(){
  const ids = computeWrongIds();
  const n = ids.length;
  const badge = el('badgeProgress');
  if(badge){
    badge.textContent = n;
    badge.hidden = false;
    badge.classList.toggle('zero', n === 0);
  }
  const smart = el('smartReview');
  if(smart){
    smart.hidden = n === 0;
    const c = el('smartReviewCount');
    if(c) c.textContent = n;
  }
}

function showToast(msg){
  const t = el('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

function escapeHtml(s){ return String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function unique(arr){ return [...new Set(arr.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'zh-Hant')); }
function shuffle(a){ const arr=[...a]; for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function optionOrder(x){ return optionOrders[x.id] || (optionOrders[x.id]=shuffle(x.options.map((_,i)=>i))); }

function fillFilters(){
  fillSelect('groupFilter', '全部題號區間', unique(DATA.map(x=>x.group)));
  fillSelect('topicFilter', '全部主題', unique(DATA.map(x=>x.topic)));
}

function fillSelect(id, firstText, values){
  const s = el(id);
  s.innerHTML = '';
  const first = document.createElement('option');
  first.value = '';
  first.textContent = firstText;
  s.appendChild(first);
  values.forEach(v => {
    const option = document.createElement('option');
    option.value = v;
    option.textContent = v;
    s.appendChild(option);
  });
}

function currentFiltered(){
  const gf = el('groupFilter').value;
  const tf = el('topicFilter').value;
  return DATA.filter(x => (!gf || x.group === gf) && (!tf || x.topic === tf));
}

function setActive(list){
  activeIds = list.map(x=>x.id);
  render();
}

function keywordFrom(x){
  const text = `${x.question} ${x.answer}`;
  const terms = ['GAN','Transformer','Attention','Prompt','RAG','GDPR','ChatGPT','DALL-E','Midjourney','Stable Diffusion','CNN','RNN','LSTM','Token','多模態','幻覺','個資','版權','提示','資料','安全'];
  return terms.find(term => new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i').test(text)) || x.topic;
}

function buildReason(x){
  const text = `${x.question} ${x.answer}`;
  const key = keywordFrom(x);
  const isNegative = /何者為非|何者非|下列何者不|不是|不屬於|不適合|錯誤|無法|不應|非「/.test(text);
  const start = isNegative
    ? `這題是反向題，要找的是不正確或不適合的選項；看到題幹裡的「非、不是、不適合」要先踩一下煞車。`
    : `這題的核心關鍵字是「${key}」，先用它對齊題目真正想考的概念。`;
  const topicMap = [
    [/GAN|生成器|判別器|鑑別器/, 'GAN 的重點是「一邊生成、一邊檢查」的對抗訓練，所以答案會落在生成器與判別器的互相拉扯。'],
    [/Transformer|Attention|BERT|GPT|LLM|語言模型/, '語言模型架構題通常在考 Transformer 與注意力機制，重點是理解上下文關係，而不是單純查字典。'],
    [/Prompt|提示|思路鏈|CoT|shot|Persona|角色/, '提示工程題要看輸入是否夠明確、是否提供角色、範例、限制或步驟，越具體越容易得到穩定答案。'],
    [/RAG|檢索|上下文|Token/, 'RAG 與上下文題的重點是把外部資料或前後文交給模型參考，讓回答不要只靠模型原本記憶。'],
    [/資料|數據|訓練|品質|多樣性|清洗|匿名化/, '資料題先看品質、多樣性、合法性與前處理；資料餵得偏，模型的判斷也容易偏。'],
    [/隱私|個資|GDPR|授權|版權|肖像|倫理|公平|透明|問責|安全/, '倫理法律與安全題多半選保護、同意、授權、透明、問責與人工審核，少選省事但冒風險的做法。'],
    [/圖片|影像|圖像|Midjourney|DALL-E|Stable Diffusion|擴散|Photoshop|Blender/, '圖像題先看任務是生成、修圖、辨識還是設計工具；輸出型態對了，答案通常就很近。'],
    [/語音|音訊|音樂|字幕|TTS|Suno/, '音訊影音題要抓產出是聲音、音樂、字幕或影片，工具和模型會跟輸出媒介對應。'],
    [/商業|市場|銷售|庫存|產品|行銷|客服|廣告|文案|企業/, '商務應用題通常考效率、個人化、流程改善與決策輔助，答案要能真正改善工作場景。']
  ];
  const detail = (topicMap.find(([pattern]) => pattern.test(text)) || [null, '這類題先抓題幹動詞，再看哪個選項最直接回應需求；華麗但離題的選項通常是干擾。'])[1];
  return `${start}${detail}所以正確答案是「${x.answer}」。`;
}

function buildMemoryCue(x){
  const text = `${x.question} ${x.answer} ${(x.options||[]).join(' ')}`;
  const isNegative = /何者為非|何者非|下列何者不|不是|不屬於|不適合|錯誤|無法|不應|非「/.test(x.question);
  const cues = [];

  // 反向題的優先口訣
  if(isNegative){
    cues.push('【反向題口訣】「非、不、錯、無法」=找最爛選項；先排除三個明顯合理的，剩下那個就是答案。');
  }

  // 主題式關鍵記憶（依題目命中關鍵字）
  if(/GAN|生成對抗|生成器|判別器|鑑別器/.test(text)){
    cues.push('【GAN 雙人對打】記「生成器造假、判別器抓假」兩個角色，兩者越打越強。看到「對抗」「真假」「兩個網路」就鎖 GAN。');
  }
  if(/Transformer|Self-Attention|自注意|注意力機制/.test(text)){
    cues.push('【Transformer = 注意力】口訣「自我注意看全句」；看到「平行處理」「長距依賴」「上下文關係」就是它。');
  }
  if(/BERT/.test(text)){
    cues.push('【BERT = 雙向理解】記「B = Bidirectional」，擅長「填空、理解、分類」，不是生成。');
  }
  if(/\bGPT\b|生成式預訓練|ChatGPT/.test(text)){
    cues.push('【GPT = 生成預訓練】記「G 是 Generative（生成）」，從左到右接龍寫字，所以擅長「寫、續、答」。');
  }
  if(/CNN|卷積/.test(text)){
    cues.push('【CNN = 看圖】口訣「卷積掃格子」，做影像辨識、圖像分類最在行。');
  }
  if(/RNN|LSTM|GRU|遞迴|循環神經/.test(text)){
    cues.push('【RNN/LSTM = 看順序】口訣「一個字接一個字」，處理序列資料（語音、時間序列）。');
  }
  if(/擴散|Diffusion|Stable Diffusion/.test(text)){
    cues.push('【Diffusion = 從雜訊磨出圖】口訣「先加噪、再去噪」，現代圖像生成（Stable Diffusion、DALL-E）的核心。');
  }
  if(/VAE|變分自編碼/.test(text)){
    cues.push('【VAE = 壓縮再還原】口訣「Encoder→潛空間→Decoder」，老牌生成模型。');
  }
  if(/Prompt|提示工程|提示詞/.test(text)){
    cues.push('【Prompt 四要件】口訣「角色 + 任務 + 格式 + 限制」。越具體越穩；模糊問題=模糊答案。');
  }
  if(/CoT|思路鏈|思維鏈|Chain.?of.?Thought|逐步|Step.?by.?Step/.test(text)){
    cues.push('【CoT = 逐步推理】口訣「Let\'s think step by step」，讓模型把推理過程說出來，準確率拉高。');
  }
  if(/Few.?shot|Zero.?shot|One.?shot|範例/.test(text)){
    cues.push('【N-shot 口訣】Zero=沒範例、One=一個、Few=少量。給範例越多，模型越懂你要的格式。');
  }
  if(/Persona|角色設定|扮演/.test(text)){
    cues.push('【Persona = 戴面具】先告訴 AI「你是誰、面對誰、什麼語氣」，回答風格立刻對齊。');
  }
  if(/RAG|檢索增強|外掛知識|向量資料庫/.test(text)){
    cues.push('【RAG 三步驟】口訣「先檢索 → 再生成 → 引來源」。看到「外部知識、即時資料、引用出處」就鎖它。');
  }
  if(/Fine.?tune|微調|LoRA|Adapter/.test(text)){
    cues.push('【Fine-tuning = 量身改衣】有「大量領域資料」才用；少量資料用 Prompt 就好，別動模型權重。');
  }
  if(/RLHF|人類回饋/.test(text)){
    cues.push('【RLHF = 人類教師】口訣「人類打分→模型改進」，ChatGPT 為何聽話的關鍵。');
  }
  if(/Token|斷詞|分詞/.test(text)){
    cues.push('【Token = 詞元】記「英文≈4字母、中文≈1.5字」；上下文長度=Token 上限。');
  }
  if(/Embedding|向量|嵌入/.test(text)){
    cues.push('【Embedding = 把字變座標】口訣「語意接近、座標接近」，是語意搜尋、RAG 的基石。');
  }
  if(/Hallucination|幻覺|捏造|編造/.test(text)){
    cues.push('【AI 幻覺】口訣「一本正經胡說八道」。對策=RAG 接真實資料 + 人工查證；別全信。');
  }
  if(/Overfitting|過擬合|過度擬合/.test(text)){
    cues.push('【過擬合 = 死背考古題】訓練超準、實戰崩壞。對策=資料增量、Dropout、正則化。');
  }
  if(/多模態|Multimodal|跨模態/.test(text)){
    cues.push('【多模態 = 多種感官】口訣「文+圖+音+影」同時吃；GPT-4o、Gemini 是代表。');
  }
  if(/隱私|個資|GDPR|個人資料保護法/.test(text)){
    cues.push('【隱私三道防線】口訣「同意 → 去識別化 → 加密儲存」；遇到個資題，永遠選「最謹慎」的選項。');
  }
  if(/版權|著作權|授權|肖像|智慧財產/.test(text)){
    cues.push('【版權三件事】口訣「來源合法、明確授權、清楚標示」。AI 生成物用商用前要查授權條款。');
  }
  if(/倫理|公平|透明|問責|偏見|歧視/.test(text)){
    cues.push('【AI 倫理四原則】口訣「公平、透明、問責、隱私」。倫理題=選最「不偷懶、留人工把關」的選項。');
  }
  if(/安全|資安|防護|攻擊|越獄|Jailbreak|Prompt.?Injection/.test(text)){
    cues.push('【AI 安全】記「輸入要過濾、輸出要審核、權限要分層」。看到「直接給管理員權限」=錯。');
  }
  if(/DALL.?E|Midjourney|Stable Diffusion|Firefly|Leonardo/.test(text)){
    cues.push('【圖像生成工具】文字→圖：DALL-E、Midjourney、Stable Diffusion、Firefly。記「文生圖三大天王」。');
  }
  if(/Suno|Udio|AIVA|MusicLM/.test(text)){
    cues.push('【音樂生成】口訣「Suno 唱歌、AIVA 配樂」。看到「生成有歌詞的歌曲」就是 Suno。');
  }
  if(/Whisper|TTS|STT|ASR|語音辨識|語音合成/.test(text)){
    cues.push('【語音雙向】口訣「STT 聽→打字（Whisper）、TTS 看→念出（ElevenLabs）」。');
  }
  if(/Sora|Runway|Pika|HeyGen|Synthesia|影片生成/.test(text)){
    cues.push('【影片生成】口訣「Sora/Runway 做場景、HeyGen/Synthesia 做數位人」。');
  }
  if(/Photoshop|Firefly|Generative Fill|生成填充/.test(text)){
    cues.push('【Photoshop AI】記「生成填充 = Generative Fill」，框起來、輸入描述就補圖。');
  }
  if(/Blender|3D/.test(text)){
    cues.push('【Blender = 3D 軟體】開源 3D 建模/動畫工具，看到「3D 模型、動畫」優先想它。');
  }
  if(/Copilot|Cursor|程式碼|程式助理/.test(text)){
    cues.push('【程式碼助理】口訣「Copilot 補一段、Cursor 改整檔」。AI 寫 Code 的代表。');
  }
  if(/Notion|Otter|Fireflies|會議記錄|逐字稿/.test(text)){
    cues.push('【會議/筆記 AI】口訣「Otter/Fireflies 抓逐字稿、Notion AI 整理摘要」。');
  }
  if(/Canva|Gamma|簡報|Slides/.test(text)){
    cues.push('【簡報生成】口訣「Gamma 一鍵生成、Canva 模板套用」。');
  }
  if(/資料|數據|訓練集|清洗|品質|多樣性/.test(text) && !/隱私|版權/.test(text)){
    cues.push('【訓練資料三要件】口訣「量足、質純、源多」。看到「只用一種來源」=錯。');
  }
  if(/客服|對話|聊天機器人|Chatbot/.test(text)){
    cues.push('【AI 客服重點】口訣「常見題自動答、罕見題轉真人」。AI 不應 100% 取代人工。');
  }
  if(/行銷|文案|廣告|SEO/.test(text)){
    cues.push('【AI 行銷三用途】口訣「生內容、做個人化、A/B 測試」。AI 是「加速」不是「取代」企劃。');
  }
  if(/取代人類|完全自動|100%|絕對|永遠|全面/.test(text)){
    cues.push('【絕對化警示】看到「完全取代、100%、絕對」十之八九是錯；AI 是輔助，永遠保留人工把關。');
  }

  // 若都沒命中關鍵字，給通用記法
  if(!cues.length){
    const key = keywordFrom(x);
    cues.push(`【通用口訣】關鍵字「${key}」→ 找最「直接解決題幹動詞」的選項；華麗、絕對化、跳脫主題的選項是干擾。`);
  }

  return cues.join(' ');
}

function answerGuide(x){
  return {
    reason: buildReason(x),
    cue: buildMemoryCue(x)
  };
}

function render(){
  const idset = new Set(activeIds);
  const list = DATA.filter(x=>idset.has(x.id));
  const box = el('questions');
  box.innerHTML = '';
  if(!list.length){
    box.innerHTML = '<div class="empty">沒有符合條件的題目，換個題號區間或主題試試。</div>';
    updateStats();
    return;
  }
  const frag = document.createDocumentFragment();
  list.forEach((x, idx)=>{
    const selected = answers[x.id];
    const isRevealed = revealed.has(x.id);
    const guide = answerGuide(x);
    const card = document.createElement('article');
    card.className = 'qcard';
    const options = optionOrder(x).map((i, displayIndex)=>{
      const op = x.options[i];
      let cls = 'opt';
      if(selected === i) cls += ' selected';
      if(selected !== undefined && i === x.correctIndex) cls += ' correct';
      if(selected === i && selected !== x.correctIndex) cls += ' wrong';
      return `<button type="button" class="${cls}" data-q="${x.id}" data-i="${i}"><b>${String.fromCharCode(65+displayIndex)}.</b> ${escapeHtml(op)}</button>`;
    }).join('');
    card.innerHTML = `
      <div class="qhead">
        <div class="tags"><span class="tag topic">${escapeHtml(x.topic)}</span><span class="tag">${escapeHtml(x.group)}</span><span class="tag">第 ${escapeHtml(x.num)} 題</span></div>
        <div class="num">Q${idx+1}</div>
      </div>
      <div class="qtext">${escapeHtml(x.question)}</div>
      <div class="options">${options}</div>
      <div class="answerTools">
        <button class="answerBtn revealBtn" type="button" data-q="${x.id}">${isRevealed ? '隱藏解答' : '顯示解答'}</button>
        <span class="hint">正解方向預設遮蔽，點開後會看到答案、AI解析與加強記憶口訣。</span>
      </div>
      <div class="answerBox ${isRevealed ? 'show' : ''}">
        <div class="answerTitle">正解方向</div>
        <div class="answerText">
          <p><b>正確答案：</b>${escapeHtml(x.answer)}</p>
          <p><b>AI解析：</b>${escapeHtml(guide.reason)}</p>
        </div>
        <div class="memCue"><b>加強記憶：</b>${escapeHtml(guide.cue)}</div>
      </div>`;
    frag.appendChild(card);
  });
  box.appendChild(frag);
  updateStats();
}

function updateStats(){
  const idset = new Set(activeIds);
  const list = DATA.filter(x=>idset.has(x.id));
  const ansList = list.filter(x=>answers[x.id] !== undefined);
  const correct = ansList.filter(x=>answers[x.id] === x.correctIndex).length;
  const total = list.length;
  const answered = ansList.length;
  const progressPct = total ? Math.round(answered / total * 100) : 0;
  const score = total ? Math.round(correct / total * 100) : 0;
  const passed = score >= 70;
  el('shownCount').textContent = total;
  el('answeredCount').textContent = answered;
  el('correctCount').textContent = correct;
  el('rateCount').textContent = `${answered}/${total}｜${progressPct}%`;
  el('progressBar').style.width = progressPct + '%';
  const dock = document.querySelector('.dock');
  if(scoreVisible){
    el('bottomScore').innerHTML = `${score} <small style="font-size:13px;font-weight:650;opacity:.85">分</small><span class="verdict">${passed ? '合格' : '未達標'}</span>`;
    el('bottomScore').className = 'value';
    dock.classList.toggle('pass', passed);
    dock.classList.toggle('fail', !passed);
  }else{
    el('bottomScore').textContent = '••••••';
    el('bottomScore').className = 'value masked';
    dock.classList.remove('pass','fail');
  }
}

function startQuiz(){
  const filtered = currentFiltered();
  const size = el('quizSize').value;
  let list = shuffle(filtered);
  if(size !== 'all') list = list.slice(0, Number(size));
  answers = {};
  revealed = new Set();
  optionOrders = {};
  setActive(list);
  persistSession();
  window.scrollTo({top:0,behavior:'smooth'});
}

let glossInited = false;
function renderGlossList(q){
  const listBox = el('glossResults');
  if(!listBox) return;
  q = (q||'').trim().toLowerCase();
  const sections = GLOSSARY.map(sec=>{
    const items = sec.items.filter(it=>{
      if(!q) return true;
      return `${it.term} ${it.zh} ${it.desc}`.toLowerCase().includes(q);
    });
    if(!items.length) return '';
    const list = items.map(it=>`
      <div class="glossItem">
        <div class="glossTerm">${escapeHtml(it.term)}<span class="zh">${escapeHtml(it.zh)}</span></div>
        <div class="glossDesc">${escapeHtml(it.desc)}</div>
      </div>`).join('');
    return `<section class="glossSection"><h2>${escapeHtml(sec.section)} <span class="count">${items.length} 個</span></h2><div class="glossList">${list}</div></section>`;
  }).filter(Boolean).join('');
  listBox.innerHTML = sections || '<div class="empty">查無相關用詞，換個關鍵字試試。</div>';
}

  if(!glossInited){
    box.innerHTML = `
      <div class="glossSearchRow"><input id="glossSearch" type="search" placeholder="搜尋英文用詞、中文翻譯或關鍵字…"></div>
      <div id="glossResults"></div>`;
    el('glossSearch').addEventListener('input', e => renderGlossList(e.target.value));
    glossInited = true;
  }
  renderGlossList(el('glossSearch').value);
}

/* ========== 頁籤切換 ========== */
function switchTab(name){
  document.querySelectorAll('.tabBtn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  document.querySelectorAll('.tabPanel').forEach(p=>p.classList.toggle('active', p.id===`tab-${name}`));
  // 非測驗頁時隱藏底部分數浮窗與頂部測驗控制
  const dock = document.querySelector('.dock');
  const topCtrl = document.querySelector('.controlCard.actionCard');
  const scoreLine = document.querySelector('.scoreline');
  const toolsPanel = el('toolsPanel');
  const isQuiz = name === 'quiz';
  if(dock) dock.style.display = isQuiz ? '' : 'none';
  if(topCtrl) topCtrl.style.display = isQuiz ? '' : 'none';
  if(scoreLine) scoreLine.style.display = isQuiz ? '' : 'none';
  if(toolsPanel && !isQuiz){ toolsPanel.classList.remove('open'); el('toggleTools').textContent = '▲ 篩選'; }
  // 切到對應頁時渲染
  if(name === 'gloss') renderGlossary();
  if(name === 'tips') renderTips();
  if(name === 'progress') renderProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ========== 「我的進度」頁渲染 ========== */
function renderProgress(){
  const box = el('progressBox');
  if(!box) return;
  const ov = computeOverallStats();
  const topics = computeTopicStats();
  const wrongIds = computeWrongIds();
  const masteredSet = new Set(store.mastered);

  // 統計區塊
  const accClass = ov.acc >= 70 ? 'good' : (ov.acc >= 50 ? '' : 'warn');
  const statsHtml = `
    <div class="statsCard">
      <h2>學習儀表板</h2>
      <div class="statRow">
        <div class="statBlock"><div class="lbl">已作答題數</div><div class="val">${ov.answered}</div><div class="sub">／ ${DATA.length}</div></div>
        <div class="statBlock ${accClass}"><div class="lbl">累計答對率</div><div class="val">${ov.acc}%</div><div class="sub">${ov.totalRight} 對／${ov.totalWrong} 錯</div></div>
        <div class="statBlock good"><div class="lbl">已掌握</div><div class="val">${ov.mastered}</div><div class="sub">連對 3 次自動標記</div></div>
      </div>
    </div>`;

  // 主題答對率
  let topicHtml = '';
  if(topics.length){
    const weakest = topics.slice(0,3).filter(t => t.total >= 2);
    const weakStr = weakest.length
      ? weakest.map(t => `${escapeHtml(t.topic)}（${t.acc}%）`).join('、')
      : '資料還不夠，再多答幾題就會浮現。';
    topicHtml = `
      <div class="statsCard">
        <h2>各主題答對率（由弱到強）</h2>
        <div class="topicBars">
          ${topics.map(t => {
            const cls = t.acc >= 70 ? '' : (t.acc >= 50 ? 'mid' : 'low');
            return `<div class="topicBar"><div class="name" title="${escapeHtml(t.topic)}">${escapeHtml(t.topic)}</div><div class="bar"><i class="${cls}" style="width:${t.acc}%"></i></div><div class="pct">${t.acc}% (${t.total})</div></div>`;
          }).join('')}
        </div>
        <div class="weakHint"><b>最弱主題：</b>${weakStr}</div>
        <div class="actionBar">
          <button class="smartBtn" id="reviewWrongBtn" ${wrongIds.length ? '' : 'disabled'}>只抽錯題複習（${wrongIds.length} 題）</button>
          <button class="ghost" id="drillWeakBtn" ${weakest.length ? '' : 'disabled'}>抽最弱主題 20 題</button>
        </div>
      </div>`;
  } else {
    topicHtml = `<div class="statsCard"><h2>各主題答對率</h2><div class="empty" style="margin:0">尚未作答任何題目，先去「題庫測驗」頁開始作答吧。</div></div>`;
  }

  // 錯題本
  let wrongHtml;
  if(wrongIds.length === 0){
    wrongHtml = `<div class="statsCard"><h2>錯題本</h2><div class="emptyWrong">目前沒有未掌握的錯題。答錯題目會自動進到這裡，連對 3 次或手動標記後會自動移出。</div></div>`;
  } else {
    const items = wrongIds.map(id => {
      const q = DATA.find(x=>x.id===id);
      if(!q) return '';
      const s = store.qStats[id];
      const isMastered = masteredSet.has(id);
      const ago = s.lastTs ? timeAgo(s.lastTs) : '';
      return `
        <article class="wrongItem ${isMastered?'masteredItem':''}">
          <div class="head">
            <span class="tag topic">${escapeHtml(q.topic)}</span>
            <span class="tag">第 ${escapeHtml(q.num)} 題</span>
            <span class="wc">錯 ${s.wrongs} 次</span>
            ${s.corrects ? `<span class="tag" style="background:#f0fdf4;color:#166534;border-color:#bbf7d0">對 ${s.corrects} 次</span>` : ''}
            ${ago ? `<span style="margin-left:auto;font-size:11px">${ago}</span>` : ''}
          </div>
          <div class="qtxt">${escapeHtml(q.question)}</div>
          <div class="ans"><b>正解：</b>${escapeHtml(q.answer)}</div>
          <div class="row">
            <button class="ghost" data-act="redo" data-id="${id}">立刻重做</button>
            <button class="ghost" data-act="master" data-id="${id}">標記已掌握</button>
          </div>
        </article>`;
    }).join('');
    wrongHtml = `<div class="statsCard"><h2>錯題本（${wrongIds.length} 題待複習）</h2><div class="wrongList">${items}</div></div>`;
  }

  // 進度管理
  const adminHtml = `
    <div class="statsCard">
      <h2>進度管理</h2>
      <div class="actionBar">
        <button class="ghost" id="exportBtn">匯出進度 JSON</button>
        <button class="ghost" id="importBtn">匯入進度 JSON</button>
        <button class="danger" id="resetProgressBtn">清空所有進度</button>
      </div>
      <div class="weakHint" style="background:#fbfdff;border-color:#dbeafe;color:#1e3a8a;margin-top:10px">
        <b>提醒：</b>學習進度儲存在這台瀏覽器的本機快取中（localStorage），不會上傳雲端。換裝置、換瀏覽器或清除瀏覽資料會消失，建議定期匯出 JSON 備份。
      </div>
    </div>`;

  box.innerHTML = statsHtml + topicHtml + wrongHtml + adminHtml;
}

function timeAgo(ts){
  const diff = (Date.now() - ts) / 1000;
  if(diff < 60) return '剛剛';
  if(diff < 3600) return `${Math.floor(diff/60)} 分鐘前`;
  if(diff < 86400) return `${Math.floor(diff/3600)} 小時前`;
  return `${Math.floor(diff/86400)} 天前`;
}

/* ========== 錯題複習 / 弱項抽題 ========== */
function startWrongReview(){
  const ids = computeWrongIds();
  if(!ids.length){ showToast('目前沒有需要複習的錯題'); return; }
  ids.forEach(id => { delete answers[id]; delete optionOrders[id]; revealed.delete(id); });
  activeIds = ids;
  persistSession();
  switchTab('quiz');
  render();
  window.scrollTo({top:0, behavior:'smooth'});
  showToast(`開始複習 ${ids.length} 題錯題`);
}

function startWeakDrill(){
  const topics = computeTopicStats();
  const weakest = topics.slice(0,3).filter(t => t.total >= 2);
  if(!weakest.length){ showToast('資料還不夠'); return; }
  const targetTopics = new Set(weakest.map(t=>t.topic));
  let pool = DATA.filter(x => targetTopics.has(x.topic));
  pool = shuffle(pool).slice(0, 20);
  const ids = pool.map(x=>x.id);
  ids.forEach(id => { delete answers[id]; delete optionOrders[id]; revealed.delete(id); });
  activeIds = ids;
  persistSession();
  switchTab('quiz');
  render();
  window.scrollTo({top:0, behavior:'smooth'});
  showToast(`抽出 ${ids.length} 題弱項複習`);
}

function redoSingle(id){
  delete answers[id];
  delete optionOrders[id];
  revealed.delete(id);
  activeIds = [id];
  persistSession();
  switchTab('quiz');
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function markMastered(id){
  if(!store.mastered.includes(id)) store.mastered.push(id);
  saveStore();
  updateBadges();
  renderProgress();
  showToast('已標記為「已掌握」');
}

/* ========== 匯出 / 匯入 / 清空 ========== */
function exportProgress(){
  const data = JSON.stringify(store, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `藏題閣進度_${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('已匯出進度 JSON');
}

function importProgress(file){
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      if(!obj || obj.version !== 1) throw new Error('版本不符');
      if(!confirm('確定要用匯入的進度覆蓋目前的進度嗎？此動作無法復原。')) return;
      store = Object.assign(defaultStore(), obj);
      saveStore();
      // 同步到目前 session
      answers = Object.assign({}, store.answers);
      revealed = new Set(store.revealed);
      optionOrders = Object.assign({}, store.optionOrders);
      activeIds = (store.activeIds||[]).slice();
      if(!activeIds.length){ const all = DATA.slice(0,80); activeIds = all.map(x=>x.id); }
      updateBadges();
      renderProgress();
      render();
      showToast('已成功匯入進度');
    } catch(e){
      alert('匯入失敗：' + e.message);
    }
  };
  reader.readAsText(file);
}

function resetAllProgress(){
  if(!confirm('將清除所有作答、錯題、統計與已掌握紀錄，僅保留目前選的題組。確定？')) return;
  const keepActive = activeIds.slice();
  store = defaultStore();
  store.activeIds = keepActive;
  saveStore();
  answers = {};
  revealed = new Set();
  optionOrders = {};
  updateBadges();
  renderProgress();
  render();
  showToast('已清空所有進度');
}

function bindEvents(){
  document.addEventListener('click', e=>{
    const opt = e.target.closest('.opt');
    if(opt){
      const qid = Number(opt.dataset.q);
      const picked = Number(opt.dataset.i);
      recordAnswer(qid, picked);
      persistSession();
      updateBadges();
      render();
      return;
    }
    const rb = e.target.closest('.revealBtn');
    if(rb){
      const id = Number(rb.dataset.q);
      revealed.has(id) ? revealed.delete(id) : revealed.add(id);
      persistSession();
      render();
      return;
    }
    const tabBtn = e.target.closest('.tabBtn');
    if(tabBtn){
      switchTab(tabBtn.dataset.tab);
      return;
    }
    // 進度頁的動作按鈕
    const actBtn = e.target.closest('[data-act]');
    if(actBtn){
      const id = Number(actBtn.dataset.id);
      if(actBtn.dataset.act === 'redo') redoSingle(id);
      if(actBtn.dataset.act === 'master') markMastered(id);
      return;
    }
    if(e.target.id === 'reviewWrongBtn'){ startWrongReview(); return; }
    if(e.target.id === 'drillWeakBtn'){ startWeakDrill(); return; }
    if(e.target.id === 'exportBtn'){ exportProgress(); return; }
    if(e.target.id === 'importBtn'){ el('importFile').click(); return; }
    if(e.target.id === 'resetProgressBtn'){ resetAllProgress(); return; }
  });
  el('importFile').addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if(f) importProgress(f);
    e.target.value = '';
  });
  ['groupFilter','topicFilter'].forEach(id => el(id).addEventListener('input', () => { setActive(currentFiltered()); persistSession(); }));
  el('toggleTools').onclick = () => {
    const open = el('toolsPanel').classList.toggle('open');
    el('toggleTools').textContent = (open ? '▼' : '▲') + ' 篩選';
  };
  el('startQuiz').onclick = startQuiz;
  el('startQuizTop').onclick = startQuiz;
  el('smartReview').onclick = startWrongReview;
  el('showAll').onclick = () => { answers={}; revealed=new Set(); optionOrders={}; setActive(currentFiltered()); persistSession(); };
  el('resetAnswers').onclick = () => { answers={}; revealed=new Set(); persistSession(); render(); };
  el('toggleScore').onclick = () => {
    scoreVisible = !scoreVisible;
    el('toggleScore').textContent = scoreVisible ? '隱藏' : '顯示';
    updateStats();
  };
}

bindEvents();
fillFilters();
// 啟動時：若 store 有先前進度就還原，否則新抽題
if(activeIds.length && activeIds.some(id => DATA.find(x=>x.id===id))){
  // 過濾掉無效 id
  activeIds = activeIds.filter(id => DATA.find(x=>x.id===id));
  render();
} else {
  startQuiz();
}
updateBadges();
</script>
</body>
</html>
